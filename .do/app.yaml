# DigitalOcean App Platform — bridle.cleanslice.org
#
# Deploys the docs site (VitePress) as a Static Site, with the SDK bundle
# built and copied into docs/public/sdk/ during the build.
#
# IMPORTANT: This spec defines a `static_sites:` component, NOT a `services:`.
# DigitalOcean does NOT change the component type when you `update` an
# existing app. If your app was originally created as a Web Service, you
# MUST delete it and recreate from this spec:
#
#   doctl apps list                  # find the existing app id
#   doctl apps delete <APP_ID>       # confirm with y
#   doctl apps create --spec bridle/.do/app.yaml
#
# DNS (Cloudflare or your DNS provider for cleanslice.org):
#   bridle  CNAME  <app-name>.ondigitalocean.app   (DNS only, no proxy)
#
# DigitalOcean handles the TLS cert via Let's Encrypt automatically.

name: bridle-docs
region: fra1

static_sites:
  - name: docs
    # Repo root contains both sdk/ and docs/. Build runs from here.
    source_dir: /
    github:
      repo: CleanSlice/bridle
      branch: main
      deploy_on_push: true

    # Build the SDK first, then the VitePress site (which runs copy-sdk.mjs
    # to copy bridle.js into docs/public/sdk/ before vitepress build).
    build_command: cd sdk && npm ci && npm run build && cd ../docs && npm ci && npm run build

    # VitePress build output.
    output_dir: docs/docs/.vitepress/dist

    index_document: index.html
    error_document: 404.html

    # Pin the Node version so future buildpack updates don't break the build.
    envs:
      - key: NODE_VERSION
        value: "20"
        scope: BUILD_TIME

domains:
  - domain: bridle.cleanslice.org
    type: PRIMARY
    zone: cleanslice.org
